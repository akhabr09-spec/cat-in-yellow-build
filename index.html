<!DOCTYPE html>
<html lang="en-us">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, viewport-fit=cover, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Cat in Yellow</title>
<link rel="shortcut icon" href="TemplateData/favicon.ico">
<link rel="stylesheet" href="TemplateData/style.css">
</head>
<body>
<div id="unity-container" style="position: absolute; width: 100%; height: 100%; left: 0%; top: 0%;">
<canvas id="unity-canvas" style="position: absolute; width: 100%; height: 100%"></canvas>
<div id="unity-loading-bar" style="display: block;">
<div id="unity-logo"></div>
<div id="unity-progress-bar-empty">
<div id="unity-progress-bar-full"></div>
</div>
</div>
<div id="unity-warning"></div>
</div>

<!-- Yandex Games polyfill -->
<script>
window.player = {
    getMode: function() { return 'lite'; },
    setMode: function() {},
    getData: function() { return Promise.resolve({}); },
    setData: function() {}
};
window.ysdk = null;
window.yaGamesReady = true;
window.YaGames = {
    init: function() {
        return Promise.resolve({
            adv: {
                showFullscreenAdv: function() {},
                showRewardedVideo: function() {}
            },
            getPlayer: function() {
                return Promise.resolve({
                    getMode: function() { return 'lite'; },
                    setMode: function() {},
                    getData: function() { return Promise.resolve({}); },
                    setData: function() {}
                });
            }
        });
    }
};
</script>

<!-- GameMonetize SDK -->
<script type="text/javascript">
   window.SDK_OPTIONS = {
      gameId: "your_game_id_here",
      onEvent: function (a) {
         switch (a.name) {
            case "SDK_GAME_PAUSE":
               var canvas = document.querySelector("#unity-canvas");
               if (canvas) canvas.style.display = "none";
               break;
            case "SDK_GAME_START":
               var canvas = document.querySelector("#unity-canvas");
               if (canvas) canvas.style.display = "block";
               break;
            case "SDK_READY":
               break;
         }
      }
   };
(function (a, b, c) {
   var d = a.getElementsByTagName(b)[0];
   a.getElementById(c) || (a = a.createElement(b), a.id = c, a.src = "https://api.gamemonetize.com/sdk.js", d.parentNode.insertBefore(a, d))
})(document, "script", "gamemonetize-sdk");
</script>

<script>
    var myGameInstance = null;

    function loadUnity() {
        var container = document.querySelector("#unity-container");
        var canvas = document.querySelector("#unity-canvas");
        var loadingBar = document.querySelector("#unity-loading-bar");
        var progressBarFull = document.querySelector("#unity-progress-bar-full");
        var warningBanner = document.querySelector("#unity-warning");

        function unityShowBanner(msg, type) {
            function updateBannerVisibility() {
                warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
            }
            var div = document.createElement('div');
            div.innerHTML = msg;
            warningBanner.appendChild(div);
            if (type == 'error') div.style = 'background: red; padding: 10px;';
            else {
                if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
                setTimeout(function() {
                    warningBanner.removeChild(div);
                    updateBannerVisibility();
                }, 5000);
            }
            updateBannerVisibility();
        }

        var buildUrl = "Build";
        var loaderUrl = buildUrl + "/7a2dbded24d57e056180125b1583e7c4.loader.js";
        var config = {
            dataUrl: buildUrl + "/9b271f2ab76c2f04cd4ac0381c888633.data",
            frameworkUrl: buildUrl + "/d97ebf8ab728c0fa999ae69e3167937f.framework.js",
            codeUrl: buildUrl + "/e9b76398d967347db5e47c20a4161af5.wasm",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "Awecom",
            productName: "The Cat in Yellow",
            productVersion: "1.0",
            showBanner: unityShowBanner,
        };

        if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
            var meta = document.createElement('meta');
            meta.name = 'viewport';
            meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
            document.getElementsByTagName('head')[0].appendChild(meta);
            container.className = "unity-mobile";
            canvas.className = "unity-mobile";
        } else {
            canvas.style.width = "100%";
            canvas.style.height = "100%";
        }

        loadingBar.style.display = "block";

        var script = document.createElement("script");
        script.src = loaderUrl;
        script.onload = function() {
            createUnityInstance(canvas, config, function(progress) {
                progressBarFull.style.width = 100 * progress + "%";
            }).then(function(unityInstance) {
                myGameInstance = unityInstance;
                loadingBar.style.display = "none";
                console.log('Unity game loaded successfully');
            }).catch(function(message) {
                alert(message);
            });
        };

        document.body.appendChild(script);
    }

    document.addEventListener('DOMContentLoaded', function() {
        console.log('Starting game initialization...');
        loadUnity();
    });

    function showAd() {
        if (typeof sdk !== 'undefined' && sdk.showBanner !== 'undefined') {
            sdk.showBanner();
        }
    }
</script>
</body>
</html>
